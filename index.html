<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AH IPTV - Premium Streaming Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        :root {
            --bg-deep: #07080b;
            --bg-surface: #0f111a;
            --bg-card: #171923;
            --primary: #ff002b;
            --primary-glow: rgba(255, 0, 43, 0.4);
            --accent-cyan: #00f0ff;
            --text-pure: #ffffff;
            --text-stale: #8a8f9d;
            --line-edge: rgba(255, 255, 255, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-pure);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* PREMIUM BAR DESIGN */
        .app-navbar {
            background: linear-gradient(to bottom, #0d0f17, var(--bg-deep));
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line-edge);
            z-index: 100;
            flex-shrink: 0;
        }

        .brand-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .brand-logo span {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
        }

        /* METRICS MONITORING SYSTEM */
        .telemetry-deck {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .metric-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line-edge);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-stale);
        }

        .metric-pill .pulse-indicator {
            width: 6px;
            height: 6px;
            background: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66;
        }

        .metric-pill span.highlight {
            color: var(--text-pure);
        }

        /* WRAPPER TO CONTROL BODY SCROLL CONFLICTS WITH FOOTER */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* APP STAGE CONTAINER CORE FRAMEWORK */
        .app-stage {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            gap: 24px;
        }

        @media (min-width: 1024px) {
            .app-stage {
                flex-direction: row;
                height: calc(100vh - 135px);
            }
            .video-theater-block {
                flex: 1.4;
                position: sticky;
                top: 0;
                height: 100% !important;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }
            .navigation-sidebar-block {
                flex: 0.9;
                height: 100%;
                background: var(--bg-surface);
                border-radius: 20px;
                border: 1px solid var(--line-edge);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
        }

        /* FIXED VIDEO WINDOW CONSOLE */
        .video-viewport-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .video-viewport-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* INTERACTION HUD OVERLAY */
        .playback-hud-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 15px;
        }

        .video-viewport-wrapper:hover .playback-hud-overlay,
        .video-viewport-wrapper.hud-active .playback-hud-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .hud-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-pure);
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-btn:hover {
            background: var(--text-pure);
            color: var(--bg-deep);
            transform: scale(1.08);
        }

        .hud-btn.hud-master-play {
            width: 52px;
            height: 52px;
            font-size: 18px;
            background: var(--primary);
            border-color: transparent;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .hud-btn.hud-master-play:hover {
            background: #ff2247;
            transform: scale(1.06);
            color: var(--text-pure);
        }

        /* CLICKABLE REALTIME LIVE SYNC BUTTON */
        .hud-live-tag-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 0, 43, 0.2);
            border: 1px solid var(--primary);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-pure);
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 15;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(255, 0, 43, 0.3);
        }

        .hud-live-tag-btn::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff002b;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff002b;
        }

        .hud-live-tag-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: scale(1.04);
        }

        /* REFACTORED SEARCH SYSTEM */
        .search-deck {
            padding: 20px;
            border-bottom: 1px solid var(--line-edge);
            flex-shrink: 0;
        }

        .search-input-container {
            position: relative;
            width: 100%;
        }

        .search-input-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-stale);
            font-size: 15px;
        }

        .search-input-container input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line-edge);
            border-radius: 14px;
            color: var(--text-pure);
            font-size: 14px;
            outline: none;
            transition: all 0.20s ease;
        }

        .search-input-container input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.15);
        }

        /* ENGINE SCROLL TUNNEL */
        .grid-scroll-tunnel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .grid-scroll-tunnel::-webkit-scrollbar {
            width: 6px;
        }
        .grid-scroll-tunnel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .channel-matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 14px;
        }

        /* CARD COMPONENT DESIGN */
        .channel-card {
            background: var(--bg-card);
            border-radius: 14px;
            aspect-ratio: 1/1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--line-edge);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .channel-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .channel-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.25s ease;
        }

        .channel-card:hover img {
            transform: scale(1.05);
        }

        .fallback-text-frame {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-stale);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        /* TRACK ACTIVE CHANNEL LOGIC STATE */
        .channel-card.state-active {
            border-color: var(--primary);
            background: rgba(255, 0, 43, 0.04);
            box-shadow: inset 0 0 15px rgba(255, 0, 43, 0.15);
        }

        .channel-card.state-active::before {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        /* SOCIAL ENGAGEMENT DECK */
        .social-engagement-deck {
            padding: 20px;
            background: linear-gradient(to top, #0b0c13, transparent);
            border-top: 1px solid var(--line-edge);
            text-align: center;
            flex-shrink: 0;
        }

        .engagement-prompt {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-stale);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .hyperlink-cluster {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-trigger-node {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--text-pure);
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-trigger-node:hover {
            transform: translateY(-3px);
            filter: brightness(1.15);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .node-telegram { background: #229ED9; }
        .node-facebook { background: #1877F2; }

        /* PREMIUM APPLICATION FOOTER LAYER */
        .app-footer {
            background: #090b11;
            border-top: 1px solid var(--line-edge);
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        .footer-copyright {
            font-size: 12px;
            color: var(--text-stale);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .footer-copyright span {
            color: var(--primary);
            font-weight: 800;
        }

        .footer-attribution {
            font-size: 12px;
            color: var(--text-stale);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer-attribution i {
            color: var(--primary);
            font-size: 11px;
            animation: heartPulse 1.6s infinite ease-in-out;
        }

        .footer-attribution a {
            color: var(--text-pure);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .footer-attribution a i {
            color: #0077b5;
            animation: none;
            font-size: 13px;
        }

        .footer-attribution a:hover {
            color: var(--primary);
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* STICKY/FIXED RESPONSIVE LAYOUT SYSTEM DEPLOYMENT */
        @media (max-width: 1023px) {
            body {
                overflow: hidden; /* Prevent global browser jitter */
                height: 100vh;
            }
            .app-navbar {
                padding: 12px 16px;
            }
            .content-wrapper {
                overflow: hidden;
                height: calc(100vh - 65px);
            }
            .app-stage {
                padding: 0;
                gap: 0;
                flex-direction: column;
                height: 100%;
            }
            /* LOCKS THE THEATER FRAME AT TOP FIXED VIEW IN RESPONSIVE MODE */
            .video-theater-block {
                position: sticky;
                top: 0;
                width: 100%;
                z-index: 50;
                background: var(--bg-deep);
                padding: 10px 10px 15px 10px;
                flex-shrink: 0;
            }
            .video-viewport-wrapper {
                border-radius: 14px;
            }
            /* MAKE THE SIDEBAR CHANNELS LIST THE ONLY SCROLLABLE AREA */
            .navigation-sidebar-block {
                flex: 1;
                background: var(--bg-surface);
                border-radius: 20px 20px 0 0;
                border: 1px solid var(--line-edge);
                border-bottom: none;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .app-footer {
                flex-direction: column;
                gap: 6px;
                padding: 12px;
                text-align: center;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <!-- APPLICATION SYSTEM BAR -->
    <div class="app-navbar">
        <div class="brand-logo">AH <span>IPTV</span></div>
        
        <div class="telemetry-deck">
            <div class="metric-pill">
                <span class="pulse-indicator"></span>
                Active: <span class="highlight" id="liveUsers">0</span>
            </div>
            <div class="metric-pill">
                <i class="fas fa-eye" style="color: var(--primary)"></i>
                Hits: <span class="highlight" id="totalViews">0</span>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE INNER SCROLL CONTAINER -->
    <div class="content-wrapper">
        <div class="app-stage">
            
            <!-- LEFT SCREEN STAGE -->
            <div class="video-theater-block">
                <div class="video-viewport-wrapper" id="viewportFrame">
                    <video id="video" autoplay playsinline></video>
                    
                    <!-- INTERACTIVE LIVE SYNC ACTION BADGE -->
                    <button class="hud-live-tag-btn" onclick="event.stopPropagation(); syncToLiveTime();" title="Sync to Realtime Live Stream">Live</button>
                    
                    <!-- PLAYBACK CONTROLS OVERLAY INTERACTION HUD -->
                    <div class="playback-hud-overlay" id="hudOverlay">
                        <button class="hud-btn" onclick="event.stopPropagation(); prevChannel();" title="Previous Station">
                            <i class="fas fa-backward"></i>
                        </button>
                        <button class="hud-btn" onclick="event.stopPropagation(); toggleMute();" id="masterMuteBtn" title="Toggle Mute">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <button class="hud-btn hud-master-play" onclick="event.stopPropagation(); togglePlay();" id="masterPlayBtn" title="Toggle Playback">
                            <i class="fas fa-pause"></i>
                        </button>
                        <button class="hud-btn" onclick="event.stopPropagation(); toggleFullscreen();" id="masterScreenBtn" title="Toggle Fullscreen">
                            <i class="fas fa-expand"></i>
                        </button>
                        <button class="hud-btn" onclick="event.stopPropagation(); nextChannel();" title="Next Station">
                            <i class="fas fa-forward"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT NAVIGATION PANEL SIDEBAR -->
            <div class="navigation-sidebar-block">
                <div class="search-deck">
                    <div class="search-input-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchConsole" placeholder="Search live streams..." onkeyup="filterLiveMatrix()">
                    </div>
                </div>

                <!-- CHANNELS TUNNEL -->
                <div class="grid-scroll-tunnel">
                    <div class="channel-matrix-grid" id="channelGrid"></div>
                </div>

                <!-- SOCIAL ATTACHMENT DECK -->
                <div class="social-engagement-deck">
                    <div class="engagement-prompt">আমার টিভি সম্পর্কে মতামত জানাতে</div>
                    <div class="hyperlink-cluster">
                        <a href="https://t.me/abirhassan94" target="_blank" rel="noopener noreferrer" class="social-trigger-node node-telegram">
                            <i class="fab fa-telegram-plane"></i>
                        </a>
                        <a href="https://www.facebook.com/abirhassan.ah" target="_blank" rel="noopener noreferrer" class="social-trigger-node node-facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- PREMIUM APPLICATION FOOTER LAYER WITH LINKEDIN CONNECTIVITY -->
    <footer class="app-footer">
        <div class="footer-copyright">
            &copy; 2026 <span>AH IPTV</span> Studio. All Rights Reserved.
        </div>
        <div class="footer-attribution">
            Made with <i class="fas fa-heart"></i> by <a href="https://www.linkedin.com/in/abirhassan-ah/" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i> Abir Hassan</a>
        </div>
    </footer>

    <!-- MAIN SYSTEM CONTROLLER CORE ENGINE -->
    <script>
        const endpointPlaylist = 'https://raw.githubusercontent.com/AbirHassan12/AH-IPTV/refs/heads/main/aynaott.m3u';
        let channelRegistry = [];
        let cursorIndex = 0;
        let hudFadeTimeout;
        const videoElement = document.getElementById('video');
        const viewportFrame = document.getElementById('viewportFrame');

        // INGEST PARSE REGISTRY
        fetch(endpointPlaylist)
            .then(res => res.text())
            .then(payload => {
                const lines = payload.split('\n');
                for(let i = 0; i < lines.length; i++) {
                    if(lines[i].startsWith('#EXTINF')) {
                        const referenceTag = lines[i];
                        const streamUrl = lines[i+1] ? lines[i+1].trim() : '';
                        
                        if(!streamUrl || streamUrl.startsWith('#')) continue;

                        const parseSegment = referenceTag.split(',')[1];
                        const streamName = parseSegment ? parseSegment.trim() : 'Live Stream Station';
                        
                        let assetLogo = '';
                        const extractionMatch = referenceTag.match(/tvg-logo="(.*?)"/);
                        if(extractionMatch) assetLogo = extractionMatch[1];

                        channelRegistry.push({ name: streamName, url: streamUrl, logo: assetLogo });
                    }
                }
                compileInterfaceGrid();
                if(channelRegistry.length > 0) streamChannelTarget(0);
            }).catch(fault => console.error("Critical M3U structural mapping fault: ", fault));

        // COMPILE INTERFACE STREAM CARD GRID
        function compileInterfaceGrid() {
            const containerGrid = document.getElementById('channelGrid');
            containerGrid.innerHTML = '';

            channelRegistry.forEach((station, pointer) => {
                const nodeCard = document.createElement('div');
                nodeCard.className = 'channel-card';
                
                if(station.logo) {
                    const visualAsset = document.createElement('img');
                    visualAsset.src = station.logo;
                    visualAsset.alt = station.name;
                    visualAsset.onerror = function() {
                        nodeCard.innerHTML = `<span class="fallback-text-frame">${station.name}</span>`;
                    };
                    nodeCard.appendChild(visualAsset);
                } else {
                    nodeCard.innerHTML = `<span class="fallback-text-frame">${station.name}</span>`;
                }

                nodeCard.onclick = () => streamChannelTarget(pointer);
                containerGrid.appendChild(nodeCard);
            });
        }

        // HLS CORE PLAYBACK CONTROLLER
        function streamChannelTarget(targetIndex) {
            if(targetIndex < 0 || targetIndex >= channelRegistry.length) return;
            cursorIndex = targetIndex;
            const targetedStation = channelRegistry[targetIndex];
            
            if (Hls.isSupported()) {
                if (window.globalHlsRuntime) {
                    window.globalHlsRuntime.destroy();
                }
                const hlsInstance = new Hls({
                    liveSyncDurationCount: 3,
                    liveMaxLatencyDurationCount: 10
                });
                window.globalHlsRuntime = hlsInstance;
                hlsInstance.loadSource(targetedStation.url);
                hlsInstance.attachMedia(videoElement);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { 
                    videoElement.play().catch(e => console.log("Autoplay context:", e)); 
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = targetedStation.url;
                videoElement.play().catch(e => console.log("Safari platform fallback context:", e));
            }

            document.querySelectorAll('.channel-card').forEach(card => card.classList.remove('state-active'));
            const activeStack = document.querySelectorAll('.channel-card');
            if(activeStack[targetIndex]) {
                activeStack[targetIndex].classList.add('state-active');
                activeStack[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            updateMasterPlaybackIcon(true);
        }

        // INSTANT LIVE SYNCHRONIZER
        function syncToLiveTime() {
            if (window.globalHlsRuntime) {
                // Hls engine edge computation jump
                videoElement.currentTime = window.globalHlsRuntime.liveSyncPosition;
                videoElement.play().catch(e => console.log(e));
            } else {
                // Native desktop and mobile browsers edge seek jump
                if (videoElement.seekable.length > 0) {
                    videoElement.currentTime = videoElement.seekable.end(videoElement.seekable.length - 1);
                    videoElement.play().catch(e => console.log(e));
                }
            }
            updateMasterPlaybackIcon(true);
        }

        function nextChannel() {
            let incrementedPointer = cursorIndex + 1;
            if(incrementedPointer >= channelRegistry.length) incrementedPointer = 0;
            streamChannelTarget(incrementedPointer);
        }

        function prevChannel() {
            let decrementedPointer = cursorIndex - 1;
            if(decrementedPointer < 0) decrementedPointer = channelRegistry.length - 1;
            streamChannelTarget(decrementedPointer);
        }

        // TOGGLE INTERACTION LAYERS
        function togglePlay() {
            if(videoElement.paused) {
                videoElement.play();
                updateMasterPlaybackIcon(true);
            } else {
                videoElement.pause();
                updateMasterPlaybackIcon(false);
            }
        }

        function toggleMute() {
            videoElement.muted = !videoElement.muted;
            const muteIcon = document.querySelector('#masterMuteBtn i');
            muteIcon.className = videoElement.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewportFrame.requestFullscreen().catch(err => {
                    console.error(`Fullscreen deployment fault: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // UPDATE SCREEN ORIENTATION ICON CHANGES
        document.addEventListener('fullscreenchange', () => {
            const screenIcon = document.querySelector('#masterScreenBtn i');
            if (document.fullscreenElement) {
                screenIcon.className = 'fas fa-compress';
            } else {
                screenIcon.className = 'fas fa-expand';
            }
        });

        function updateMasterPlaybackIcon(isCurrentlyPlaying) {
            const graphicIcon = document.querySelector('#masterPlayBtn i');
            graphicIcon.className = isCurrentlyPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        // SYSTEM SHORTCUT WINDOW MANAGEMENT
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
                cycleHudStateVisibility();
            }
        });

        // REAL-TIME SEARCH CONSOLE
        function filterLiveMatrix() {
            const queryToken = document.getElementById('searchConsole').value.toLowerCase();
            const compiledCards = document.querySelectorAll('.channel-card');

            channelRegistry.forEach((item, index) => {
                if(compiledCards[index]) {
                    if(item.name.toLowerCase().includes(queryToken)) {
                        compiledCards[index].style.display = 'flex';
                    } else {
                        compiledCards[index].style.display = 'none';
                    }
                }
            });
        }

        // HUD AUTO-HIDE CONTROL LAYER
        function cycleHudStateVisibility(e) {
            // Prevent auto-pauses on screen touches
            if(e && e.type === 'touchstart' && e.target !== videoElement && e.target.id !== 'hudOverlay') {
                return;
            }
            viewportFrame.classList.add('hud-active');
            clearTimeout(hudFadeTimeout);
            hudFadeTimeout = setTimeout(() => {
                viewportFrame.classList.remove('hud-active');
            }, 3000);
        }

        viewportFrame.addEventListener('mousemove', cycleHudStateVisibility);
        viewportFrame.addEventListener('touchstart', cycleHudStateVisibility, { passive: true });
    </script>
